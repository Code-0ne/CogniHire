# ============================================================================
# AI tools declaration
# ============================================================================

ai_tools_used:
  - "ChatGPT"
  - "GitHub Copilot"

ai_usage_summary: |
  ChatGPT was used for architecture discussions, debugging, documentation,
  Docker configuration, and general code review. GitHub Copilot was used
  for autocomplete and boilerplate generation. All ranking logic,
  heuristics, feature engineering, scoring functions, and system design
  were implemented and validated by the team. No candidate data was sent
  to external LLM APIs during inference or ranking.

# ============================================================================
# Approach summary
# ============================================================================

methodology_summary: |
  CogniHire is a three-stage AI candidate ranking engine combining semantic
  retrieval, structured career trajectory analysis, behavioral signal
  modeling, and neural reranking. Candidate profiles are transformed into
  rich semantic representations and retrieved using SentenceTransformer
  embeddings with FAISS cosine similarity. A Candidate Intelligence Engine
  evaluates production ML experience, ranking/search expertise, consulting
  ratio, product-company experience, career progression, behavioral
  recruiter signals, and dynamic Job Description alignment. Final ranking
  is refined using a local CrossEncoder and fused with structured feature
  scores to generate explainable rankings. The system runs entirely on CPU,
  requires no external APIs during inference, and produces deterministic,
  explainable Top-100 candidate rankings.

